name = "qiymet-az"
main = "worker/index.ts"
compatibility_date = "2025-03-25"
workers_dev = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "qiymet_db"
# Example UUID shown below. Replace it with the ID returned by: npx wrangler d1 create qiymet_db
database_id = "11111111-2222-3333-4444-555555555555"

[triggers]
crons = ["0 */6 * * *"]
